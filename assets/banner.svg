<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="omp-claude-bridge — Run Claude Code natively inside Oh My Pi">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.5" stop-color="#151a35"/>
      <stop offset="1" stop-color="#07231f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.65">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- faint grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="90" x2="1280" y2="90"/>
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="270" x2="1280" y2="270"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="640" y1="0" x2="640" y2="360"/>
    <line x1="960" y1="0" x2="960" y2="360"/>
  </g>

  <!-- bridge motif: two nodes linked by a glowing span -->
  <g transform="translate(0,262)">
    <path d="M 232 0 C 430 -74 850 -74 1048 0" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" filter="url(#soft)" opacity="0.7"/>
    <path d="M 232 0 C 430 -74 850 -74 1048 0" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <g stroke="url(#accent)" stroke-width="2" opacity="0.55">
      <line x1="340" y1="-38" x2="340" y2="6"/>
      <line x1="450" y1="-56" x2="450" y2="6"/>
      <line x1="560" y1="-65" x2="560" y2="6"/>
      <line x1="640" y1="-67" x2="640" y2="6"/>
      <line x1="720" y1="-65" x2="720" y2="6"/>
      <line x1="830" y1="-56" x2="830" y2="6"/>
      <line x1="940" y1="-38" x2="940" y2="6"/>
    </g>
    <circle cx="232" cy="0" r="14" fill="#0b1020" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="1048" cy="0" r="14" fill="#0b1020" stroke="url(#accent)" stroke-width="3"/>
    <text x="232" y="34" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#94a3b8">Oh My Pi</text>
    <text x="1048" y="34" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#94a3b8">Claude Code</text>
  </g>

  <!-- wordmark -->
  <text x="640" y="150" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, 'Cascadia Code', monospace" font-size="72" font-weight="700" letter-spacing="1" fill="#f8fafc">omp-claude-bridge</text>

  <!-- tagline -->
  <text x="640" y="196" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="23" fill="#22d3ee">Run Claude Code natively inside Oh My Pi</text>

  <!-- feature chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#cbd5e1">
    <g transform="translate(452,224)">
      <rect x="0" y="0" width="132" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="66" y="20" text-anchor="middle">AskClaude tool</text>
    </g>
    <g transform="translate(596,224)">
      <rect x="0" y="0" width="150" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="75" y="20" text-anchor="middle">1M / 200K context</text>
    </g>
    <g transform="translate(758,224)">
      <rect x="0" y="0" width="70" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="35" y="20" text-anchor="middle">MIT</text>
    </g>
  </g>
</svg>
